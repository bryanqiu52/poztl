<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>域名出售 | www.poztl.com</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --accent-gold: #c9a962;
            --accent-gold-light: #e8d5a3;
            --accent-gold-dark: #8b7355;
            --text-primary: #f5f5f5;
            --text-secondary: #a0a0a0;
            --text-muted: #606060;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 背景装饰 */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.03;
            background-image: 
                radial-gradient(circle at 20% 30%, var(--accent-gold) 1px, transparent 1px),
                radial-gradient(circle at 80% 70%, var(--accent-gold) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        .glow-orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(201, 169, 98, 0.15) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            animation: float 20s ease-in-out infinite;
        }

        .glow-orb-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(201, 169, 98, 0.1) 0%, transparent 70%);
            bottom: -50px;
            left: -50px;
            animation: float 25s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* 主内容 */
        .main-content {
            text-align: center;
            max-width: 800px;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 标签 */
        .tag {
            display: inline-block;
            padding: 8px 20px;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease-out 0.2s both;
        }

        /* 域名展示 */
        .domain-wrapper {
            margin-bottom: 50px;
            animation: fadeInUp 1s ease-out 0.4s both;
        }

        .domain {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 300;
            letter-spacing: 0.02em;
            color: var(--text-primary);
            position: relative;
            display: inline-block;
        }

        .domain::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
        }

        .domain-extension {
            color: var(--accent-gold);
            font-weight: 600;
        }

        /* 描述文字 */
        .description {
            font-size: 1.1rem;
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 50px;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        /* 特点列表 */
        .features {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 60px;
            flex-wrap: wrap;
            animation: fadeInUp 1s ease-out 0.8s both;
        }

        .feature {
            text-align: center;
        }

        .feature-icon {
            width: 50px;
            height: 50px;
            border: 1px solid var(--accent-gold-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: var(--accent-gold);
            transition: all 0.3s ease;
        }

        .feature:hover .feature-icon {
            background: var(--accent-gold);
            color: var(--bg-primary);
            transform: scale(1.1);
        }

        .feature-text {
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        /* 联系区域 */
        .contact-section {
            animation: fadeInUp 1s ease-out 1s both;
        }

        .contact-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.8rem;
            font-weight: 400;
            color: var(--text-primary);
            margin-bottom: 30px;
        }

        .contact-cards {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .contact-card {
            background: var(--bg-secondary);
            border: 1px solid rgba(201, 169, 98, 0.2);
            padding: 25px 35px;
            border-radius: 4px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 15px;
            min-width: 200px;
        }

        .contact-card:hover {
            border-color: var(--accent-gold);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(201, 169, 98, 0.1);
        }

        .contact-card svg {
            width: 24px;
            height: 24px;
            color: var(--accent-gold);
        }

        .contact-info {
            text-align: left;
        }

        .contact-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .contact-value {
            font-size: 1rem;
            color: var(--text-primary);
        }

        /* 底部 */
        .footer {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            animation: fadeIn 1s ease-out 1.2s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .features {
                gap: 30px;
            }
            
            .contact-cards {
                flex-direction: column;
                align-items: center;
            }
            
            .contact-card {
                width: 100%;
                max-width: 300px;
            }
        }

        /* 装饰线条 */
        .decorative-line {
            width: 1px;
            height: 80px;
            background: linear-gradient(to bottom, transparent, var(--accent-gold-dark), transparent);
            margin: 40px auto;
            animation: fadeIn 1s ease-out 0.9s both;
        }
    </style>
</head>
